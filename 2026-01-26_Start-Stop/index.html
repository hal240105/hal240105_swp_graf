<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <main>
        <h1>Hausübung</h1>
        <p>Start und Stop Button für Uhr. Benötigt ist addEventListener</p>

        <section>
            <h2>Uhrzeit:</h2>
            <div id="time" class="mine theirs active"></div>
        </section>

        <section id="blabla">
            <button id="dummy">START</button>
        </section>
    </main>

    <script>
        const timeDiv = document.getElementById("time");
        const dummy = document.getElementById("dummy");

        let intervalId = null;

        function updateTime() {
            const now = new Date();
            timeDiv.textContent = now.toLocaleTimeString();
        }

        dummy.addEventListener("click", () => {
            if (intervalId === null) {
                updateTime();
                intervalId = setInterval(updateTime, 1000);
                dummy.textContent = "STOP";
            } else {
                clearInterval(intervalId);
                intervalId = null;
                dummy.textContent = "START";
            }
        });
    </script>
</body>
</html>
