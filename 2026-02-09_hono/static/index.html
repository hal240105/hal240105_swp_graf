<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funktionen</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <main>
        <h1>Funktionen</h1>

        <div class="inputs">
            <input type="number" id="start" placeholder="Startwert">
            <input type="number" id="end" placeholder="Endwert">
            <input type="number" id="step" placeholder="Schrittweite">
            <button id="calculate">Berechnen</button>
        </div>

        <section>
            <h2>Werte-Tabelle:</h2>
            <table>
                <thead>
                    <tr>
                        <th>x</th>
                        <th>f(x)</th>
                        <th>g(x)</th>
                        <th>h(x)</th>
                        <th>i(x)</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </section>
    </main>
</body>
</html>
